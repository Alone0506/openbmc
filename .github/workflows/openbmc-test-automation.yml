name: QEMU AST2600 Setup CI

on: [push, workflow_dispatch]

jobs:
  openbmc-test-automation:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    permissions:
      contents: read

    env:
      OPENBMC_IMAGE_URL: https://github.com/Alone0506/openbmc/releases/download/CI_Test/obmc-phosphor-image-evb-ast2600.static.mtd
      HOST: 127.0.0.1
      USER: root
      PASS: 0penBmc
      SSH_PORT: 2222
      HTTPS_PORT: 2443
      IPMI_PORT: 2623
      QEMU_LOG: ${{ github.workspace }}/qemu.log

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download OpenBMC image
        run: curl -L -o image.mtd $OPENBMC_IMAGE_URL

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-arm \
            openssh-client \
            sshpass \
            ipmitool \
            python3-venv \
            python3-pip

      - name: Launch AST2600 EVB in QEMU
        run: >
          nohup qemu-system-arm
          -m 1G
          -M ast2600-evb
          -nographic
          -drive file=image.mtd,format=raw,if=mtd
          -net nic
          -net user,hostfwd=tcp:127.0.0.1:${SSH_PORT}-:22,hostfwd=tcp:127.0.0.1:${HTTPS_PORT}-:443,hostfwd=udp:127.0.0.1:${IPMI_PORT}-:623,hostname=qemu
          >"$QEMU_LOG" 2>&1 &

      - uses: actions/checkout@v4
        with:
          repository: Alone0506/openbmc-test-automation
          path: tests

      - name: Install openbmc-test-automation deps
        run: |
          python3 -m venv tests/.venv
          tests/.venv/bin/pip install -U pip -r tests/requirements.txt

      - name: Wait QEMU SSH work
        run: |
          for i in {1..30}; do
            sshpass -p "$PASS" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o LogLevel=ERROR \
              -p $SSH_PORT $USER@$HOST true && exit 0
            echo "SSH not ready yet (attempt ${i}/30)"
            sleep 10
          done
          tail -200 "$QEMU_LOG"
          exit 1

      - name: Run Robot
        working-directory: tests
        run: |
          . .venv/bin/activate
          robot -V env.py templates/test_openbmc_setup.robot

      - name: Cleanup
        if: always()
        run: pkill -f qemu-system-arm || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs # add artifact tag
          path: |
            ${{ env.QEMU_LOG }}
            tests/*.xml
            tests/*.html

  deploy-pages:
    needs: openbmc-test-automation
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write

    runs-on: ubuntu-latest
    steps:
      - name: Download artifact logs
        uses: actions/download-artifact@v4
        with:
          name: logs # artifact tag
          path: tests # download to tests folder

      - name: Prepare Pages Content
        if: always()
        run: |
          RUN_ID=$(date +%Y%m%d-%H%M%S)

          mkdir -p site/runs/$RUN_ID

          cp tests/*.html site/runs/$RUN_ID/ 2>/dev/null || true
          cp tests/*.xml site/runs/$RUN_ID/ 2>/dev/null || true

          # 重新產生首頁
          cat > site/index.html <<'EOF'
          <html>
          <head>
            <meta charset="utf-8">
            <title>CI Reports</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                margin: 30px;
              }
              h1 {
                margin-bottom: 20px;
              }
              details {
                margin-bottom: 12px;
                padding: 8px;
                border: 1px solid #ccc;
                border-radius: 6px;
                background: #f9f9f9;
              }
              summary {
                cursor: pointer;
                font-weight: bold;
                font-size: 16px;
              }
              ul {
                margin-top: 8px;
                margin-left: 20px;
              }
              li {
                margin: 4px 0;
              }
              a {
                text-decoration: none;
                color: #0366d6;
              }
              a:hover {
                text-decoration: underline;
              }
            </style>
          </head>
          <body>
            <h1>CI Reports</h1>
          EOF

          for d in $(ls -r site/runs); do
            echo "<details>" >> site/index.html
            echo "<summary>$d</summary>" >> site/index.html
            echo "<ul>" >> site/index.html

            for f in site/runs/$d/*; do
              fname=$(basename "$f")
              echo "<li><a href=\"runs/$d/$fname\" target=\"_blank\">$fname</a></li>" >> site/index.html
            done

            echo "</ul>" >> site/index.html
            echo "</details>" >> site/index.html
          done

          echo "</body></html>" >> site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
