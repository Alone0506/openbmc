name: QEMU AST2600 Setup CI

on: workflow_dispatch

jobs:
  openbmc-test-automation:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    permissions:
      contents: read

    env:
      OPENBMC_IMAGE_URL: https://github.com/Alone0506/openbmc/releases/download/CI_Test/obmc-phosphor-image-evb-ast2600.static.mtd
      HOST: 127.0.0.1
      USER: root
      PASS: 0penBmc
      SSH_PORT: 2222
      HTTPS_PORT: 2443
      IPMI_PORT: 2623
      QEMU_LOG: ${{ github.workspace }}/qemu.log

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download OpenBMC image
        run: curl -L -o image.mtd "$OPENBMC_IMAGE_URL"

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-arm \
            openssh-client \
            sshpass \
            ipmitool \
            jq \
            python3-venv \
            python3-pip

      - name: Launch AST2600 EVB in QEMU
        run: >
          nohup qemu-system-arm
          -m 1G
          -M ast2600-evb
          -nographic
          -drive file=image.mtd,format=raw,if=mtd
          -net nic
          -net user,hostfwd=tcp:127.0.0.1:${SSH_PORT}-:22,hostfwd=tcp:127.0.0.1:${HTTPS_PORT}-:443,hostfwd=udp:127.0.0.1:${IPMI_PORT}-:623,hostname=qemu
          >"$QEMU_LOG" 2>&1 &

      - uses: actions/checkout@v6
        with:
          repository: Alone0506/openbmc-test-automation
          path: tests

      - name: Install openbmc-test-automation deps
        working-directory: tests
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/robot --version || true

      - name: Wait SSH ready
        run: |
          set -o pipefail

          ssh_ready=false
          for i in {1..30}; do
            if sshpass -p "$PASS" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o LogLevel=ERROR \
              -p "$SSH_PORT" "$USER@$HOST" true; then
              ssh_ready=true
              break
            fi
            echo "SSH not ready yet (attempt ${i}/30)"
            sleep 10
          done
          if [ "$ssh_ready" != true ]; then
            tail -200 "$QEMU_LOG"
            exit 1
          fi

      - name: Wait Redfish ready
        run: |
          set -o pipefail

          redfish_ready=false
          for i in {1..30}; do
            if curl --fail -X GET -sk -u "${USER}:${PASS}" \
              "https://localhost:${HTTPS_PORT}/redfish/v1" | jq .; then
              redfish_ready=true
              break
            fi
            echo "Redfish not ready yet (attempt ${i}/30)"
            sleep 10
          done
          if [ "$redfish_ready" != true ]; then
            tail -200 "$QEMU_LOG"
            exit 1
          fi

      - name: Wait IPMI ready
        run: |
          set -o pipefail

          ipmi_ready=false
          for i in {1..30}; do
            if timeout 10s ipmitool -C 17 -N 3 -p "$IPMI_PORT" -U "$USER" \
              -P "$PASS" -H "$HOST" mc info; then
              ipmi_ready=true
              break
            fi
            echo "IPMI not ready yet (attempt ${i}/30)"
            sleep 10
          done
          if [ "$ipmi_ready" != true ]; then
            tail -200 "$QEMU_LOG"
            exit 1
          fi

      - name: Run Robot
        working-directory: tests
        run: |
          source .venv/bin/activate
          robot -V env.py -A test_lists/QEMU_CI redfish/ ipmi/

      - name: Cleanup
        if: always()
        run: pkill -f qemu-system-arm || true

      - name: Prepare artifact files
        if: always()
        run: |
          mkdir -p artifact
          cp "$QEMU_LOG" artifact/ || true
          cp tests/*.html artifact/ || true
          cp tests/*.xml artifact/ || true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: openbmc-test-logs
          path: artifact/*

  deploy-pages:
    needs: openbmc-test-automation
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write

    runs-on: ubuntu-latest
    steps:
      - name: Download logs
        uses: actions/download-artifact@v7
        with:
          name: openbmc-test-logs
          path: tests # download to tests folder

      - name: Prepare Pages Content
        if: always()
        run: |
          echo "<meta http-equiv=\"refresh\" content=\"0; url=report.html\">" > tests/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: tests

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
