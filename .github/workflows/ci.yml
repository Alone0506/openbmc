name: QEMU AST2600 Setup CI

on: [push, workflow_dispatch]

jobs:
  qemu-setup:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    permissions:
      contents: read

    env:
      OPENBMC_IMAGE_URL: https://github.com/Alone0506/openbmc/releases/download/CI_Test/obmc-phosphor-image-evb-ast2600.static.mtd
      HOST: 127.0.0.1
      USER: root
      PASS: 0penBmc
      SSH_PORT: 2222
      QEMU_LOG: ${{ github.workspace }}/qemu.log

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download OpenBMC image
        run: curl -L -o image.mtd $OPENBMC_IMAGE_URL

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-arm \
            openssh-client \
            sshpass \
            ipmitool \
            python3-venv \
            python3-pip

      - name: Launch AST2600 EVB in QEMU
        run: >
          nohup qemu-system-arm
          -m 1G
          -M ast2600-evb
          -nographic
          -drive file=image.mtd,format=raw,if=mtd
          -net nic
          -net user,hostfwd=tcp:127.0.0.1:${SSH_PORT}-:22
          >"$QEMU_LOG" 2>&1 &
          echo "QEMU_PID=$!" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          repository: Alone0506/openbmc-test-automation
          path: tests

      - name: Install openbmc-test-automation deps
        run: |
          python3 -m venv tests/.venv
          tests/.venv/bin/pip install -U pip -r tests/requirements.txt

      - name: Wait QEMU SSH work
        run: |
          for i in {1..30}; do
            sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no \
              -p $SSH_PORT $USER@$HOST true && exit 0
            echo "SSH not ready yet (attempt ${i}/30)"
            sleep 10
          done
          tail -200 "$QEMU_LOG"
          exit 1

      - name: Run Robot
        run: |
          . test/.venv/bin/activate
          robot -V env.py templates/test_openbmc_setup.robot

      - name: Cleanup
        if: always()
        run: pkill -f qemu-system-arm || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs
          path: |
            ${{ env.QEMU_LOG }}
            tests/*.xml
            tests/*.html
