name: QEMU AST2600 Setup CI

on:
  push:
  workflow_dispatch:

jobs:
  qemu-setup:
    name: Boot AST2600 and run setup robot
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    permissions:
      contents: read

    env:
      OPENBMC_IMAGE: $GITHUB_WORKSPACE/build/tmp/deploy/images/evb-ast2600/obmc-phosphor-image-evb-ast2600.static.mtd
      OPENBMC_TEST_REPO: https://github.com/Alone0506/openbmc-test-automation.git
      OPENBMC_TEST_DIR: openbmc-test-automation
      OPENBMC_HOST: 127.0.0.1
      OPENBMC_USERNAME: root
      OPENBMC_PASSWORD: 0penBmc
      SSH_PORT: "2222"
      HTTPS_PORT: "2443"
      IPMI_PORT: "2623"
      QEMU_LOG: ${{ github.workspace }}/qemu-ast2600.log

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate QEMU image exists
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          ls -al
          cd "$GITHUB_WORKSPACE/build"
          ls -al
          set -euo pipefail
          if [[ ! -f "$OPENBMC_IMAGE" ]]; then
            echo "Missing image: $OPENBMC_IMAGE"
            exit 1
          fi

      - name: Install host dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-arm \
            openssh-client \
            sshpass \
            ipmitool \
            python3-venv \
            python3-pip

      - name: Launch AST2600 EVB in QEMU
        run: |
          set -euxo pipefail
          nohup qemu-system-arm \
            -m 1G \
            -M ast2600-evb \
            -nographic \
            -drive file="$OPENBMC_IMAGE",format=raw,if=mtd \
            -net nic \
            -net user,hostfwd=tcp:127.0.0.1:${SSH_PORT}-:22,hostfwd=tcp:127.0.0.1:${HTTPS_PORT}-:443,hostfwd=udp:127.0.0.1:${IPMI_PORT}-:623,hostname=qemu \
            >"$QEMU_LOG" 2>&1 &
          echo "QEMU_PID=$!" >> "$GITHUB_ENV"
          echo "QEMU launched with PID $!"

      - name: Wait for SSH after boot
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            if sshpass -p "$OPENBMC_PASSWORD" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=5 \
              -p "$SSH_PORT" \
              "${OPENBMC_USERNAME}@${OPENBMC_HOST}" \
              'uname -a' >/tmp/openbmc-ssh-boot.txt 2>&1; then
              cat /tmp/openbmc-ssh-boot.txt
              exit 0
            fi

            echo "SSH not ready yet (attempt ${attempt}/60)"
            sleep 10
          done

          echo "Timed out waiting for SSH after boot."
          tail -n 200 "$QEMU_LOG" || true
          exit 1

      - name: Clone test automation and install Python requirements
        run: |
          set -euxo pipefail
          git clone "$OPENBMC_TEST_REPO"
          cd "$OPENBMC_TEST_DIR"
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for SSH again before Robot
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            if sshpass -p "$OPENBMC_PASSWORD" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=5 \
              -p "$SSH_PORT" \
              "${OPENBMC_USERNAME}@${OPENBMC_HOST}" \
              'true' >/dev/null 2>&1; then
              exit 0
            fi

            echo "SSH not ready before Robot yet (attempt ${attempt}/30)"
            sleep 10
          done

          echo "Timed out waiting for SSH before Robot."
          tail -n 200 "$QEMU_LOG" || true
          exit 1

      - name: Run Robot setup test
        run: |
          set -euxo pipefail
          cd "$OPENBMC_TEST_DIR"
          . .venv/bin/activate
          robot -V env.py templates/test_openbmc_setup.robot

      - name: Stop QEMU
        if: always()
        run: |
          if [[ -n "${QEMU_PID:-}" ]] && kill -0 "$QEMU_PID" 2>/dev/null; then
            kill "$QEMU_PID"
            wait "$QEMU_PID" || true
          fi

      - name: Upload QEMU and Robot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ast2600-qemu-setup-logs
          if-no-files-found: warn
          path: |
            ${{ env.QEMU_LOG }}
            openbmc-test-automation/output.xml
            openbmc-test-automation/log.html
            openbmc-test-automation/report.html
